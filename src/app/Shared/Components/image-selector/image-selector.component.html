<div class="card">
    <div class="card-header">
        <h3 class="card-title">Select Image</h3>
    </div>
    <div class="card-body">
        <div class="d-flex flex-md-row flex-sm-column flex-wrap">
            <div class="col-8" style="max-height: 400px; overflow-y: auto;">
                <div class="row row-cols-1 row-cols-md-3 g-4">
                    <div class="col" *ngFor="let image of images$ | async">
                        <div class="card h-100">
                            <img [src]="image.url" class="card-img-top" alt="{{image.title}}">
                            <div class="card-body">
                                <h5 class="card-title">{{image.title}}</h5>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
            <div class="col-4 bg-light p-3">
                <h5>Upload Image</h5>
                <form #form="ngForm" (ngSubmit)="uploadImage()">
                    <div class="mt-3">
                        <input type="file" class="form-control" (change)="onFileUploadChange($event)">
                    </div>

                    <div class="mt-3">
                         <input type="text" class="form-control" placeholder="File Name" name="filename" [(ngModel)]="fileName">
                    </div>

                    <div class="mt-3">
                        <input type="text" class="form-control" placeholder="Title" name="title" [(ngModel)]="title">
                    </div>

                    <div class="mt-3">
                         <button type="submit" class="btn btn-dark">Upload</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
