<div class="card">
    <div class="card-header">
        <h3 class="card-title">Select Image</h3>
    </div>
    <div class="card-body">
        <div class="d-flex flex-md-row flex-sm-column flex-wrap">
            <div class="col-8">

            </div>
            <div class="col-4 bg-light p-3">
                <h5>Upload Image</h5>
                <form>
                    <div class="mt-3">
                        <input type="file" class="form-control">
                    </div>

                    <div class="mt-3">
                         <input type="text" class="form-control" placeholder="File Name" name="filename">
                    </div>

                    <div class="mt-3">
                        <input type="text" class="form-control" placeholder="Title" name="title">
                    </div>

                    <div class="mt-3">
                         <button type="submit" class="btn btn-dark">Upload</button>
                    </div>
                </form>
            </div>
        </div>
    </div>

</div>
